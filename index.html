<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>身份证 / 护照 MRZ 校验码验证</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      line-height: 1.6;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0d1b2a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.92rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 18px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      color: #475569;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab:hover { border-color: #94a3b8; }

    .tab.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: #fff;
    }

    .panel {
      display: none;
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }

    .panel.active { display: block; }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 0.8rem;
      color: #94a3b8;
      font-weight: 400;
      margin-top: 4px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 1rem;
      font-family: "Consolas", "SF Mono", monospace;
      letter-spacing: 0.04em;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.5;
    }

    .field { margin-bottom: 18px; }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #1d4ed8;
      color: #fff;
    }

    .btn-primary:hover { background: #1e40af; }

    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }

    .btn-secondary:hover { background: #cbd5e1; }

    .result {
      margin-top: 20px;
      padding: 16px 18px;
      border-radius: 10px;
      font-size: 0.92rem;
      display: none;
    }

    .result.show { display: block; }

    .result.success {
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #14532d;
    }

    .result.error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #7f1d1d;
    }

    .result.warn {
      background: #fef9c3;
      border: 1px solid #fde047;
      color: #713f12;
    }

    .result-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .detail-list {
      list-style: none;
      margin-top: 10px;
    }

    .detail-list li {
      padding: 6px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      font-size: 0.88rem;
    }

    .detail-list li:last-child { border-bottom: none; }

    .ok { color: #15803d; font-weight: 600; }
    .bad { color: #b91c1c; font-weight: 600; }

    .callout {
      margin-top: 24px;
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.84rem;
      color: #1e3a5f;
    }

    .callout strong { color: #1d4ed8; }

    code {
      background: rgba(15, 23, 42, 0.06);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: "Consolas", "SF Mono", monospace;
      font-size: 0.9em;
    }

    .site-brand-bar {
      background: #0a0a0a;
      color: #e8d5a3;
      padding: .55rem 1.25rem;
      border-bottom: 1px solid rgba(232, 213, 163, .12);
    }
    .site-brand-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .site-logo {
      height: 34px;
      width: auto;
      display: block;
    }
    .site-brand-meta {
      display: flex;
      align-items: center;
      gap: .65rem;
      margin-left: auto;
      font-size: .84rem;
    }
    .site-team { font-weight: 600; letter-spacing: .02em; }
    .site-phone {
      color: #e8d5a3;
      text-decoration: none;
      font-variant-numeric: tabular-nums;
    }
    .site-phone:hover { color: #fff; text-decoration: underline; }

    .lang-switch {
      display: inline-flex;
      border: 1px solid rgba(232, 213, 163, .25);
      border-radius: 4px;
      overflow: hidden;
      margin-left: .5rem;
    }
    .lang-btn {
      padding: 3px 8px;
      font-size: .68rem;
      font-weight: 700;
      background: transparent;
      border: none;
      color: rgba(232, 213, 163, .55);
      cursor: pointer;
    }
    .lang-btn:hover { color: #fff; }
    .lang-btn.active {
      background: rgba(201, 162, 39, .25);
      color: #f0c14b;
    }
  </style>
</head>
<body data-i18n-title="meta.title">
  <div class="site-brand-bar">
    <div class="site-brand-inner">
      <img src="Logo.png" alt="Logo" class="site-logo" />
      <div class="site-brand-meta">
        <span class="site-team" data-i18n="team">昝颜团队</span>
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" class="lang-btn active" data-lang="zh">中</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
        <a href="tel:+971565473192" class="site-phone">0565473192</a>
      </div>
    </div>
  </div>
  <div class="page">
    <h1 data-i18n="title">证件校验码验证</h1>
    <p class="subtitle" data-i18n="subtitle">校验 18 位中国居民身份证末位校验码，以及护照 MRZ 第二行各字段校验位是否符合 ICAO 9303 标准。</p>

    <div class="tabs">
      <button class="tab active" data-tab="idcard" data-i18n="tab.id">身份证校验码</button>
      <button class="tab" data-tab="passport" data-i18n="tab.mrz">护照 MRZ 校验码</button>
    </div>

    <!-- 身份证 -->
    <section class="panel active" id="panel-idcard">
      <div class="field">
        <label for="idcard-input" data-i18n="id.label">身份证号码（18 位）</label>
        <input type="text" id="idcard-input" maxlength="18" data-i18n-placeholder="id.placeholder" placeholder="例如：11010119900307891X" autocomplete="off" spellcheck="false" />
        <p class="hint" data-i18n="id.hint">输入完整 18 位号码，末位可为数字 0–9 或字母 X。</p>
      </div>
      <div class="actions">
        <button class="btn-primary" id="btn-idcard" data-i18n="btn.verify">验证</button>
        <button class="btn-secondary" id="btn-idcard-clear" data-i18n="btn.clear">清空</button>
      </div>
      <div class="result" id="result-idcard"></div>
    </section>

    <!-- 护照 MRZ -->
    <section class="panel" id="panel-passport">
      <div class="field">
        <label for="mrz-input" data-i18n="mrz.label">护照 MRZ 第二行（44 字符）</label>
        <input type="text" id="mrz-input" maxlength="88" data-i18n-placeholder="mrz.placeholder" placeholder="例如：E123456789CHN9001011M3012311&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;0" autocomplete="off" spellcheck="false" />
        <p class="hint" data-i18n="mrz.hint">只需粘贴护照机读区最后一行（44 字符）。若粘贴两行，将自动取最后一行。</p>
      </div>
      <div class="actions">
        <button class="btn-primary" id="btn-passport" data-i18n="btn.verify">验证</button>
        <button class="btn-secondary" id="btn-passport-clear" data-i18n="btn.clear">清空</button>
      </div>
      <div class="result" id="result-passport"></div>
    </section>

    <div class="callout" data-i18n-html="callout">
      <strong>说明：</strong>
      身份证采用 GB 11643 规定的 MOD 11-2 算法；
      护照 MRZ 采用 ICAO Doc 9303 标准，权重循环为 7、3、1，对护照号、出生日期、有效期、可选数据及复合校验位分别验算。
      本工具仅校验码算法是否正确，不验证号码是否真实签发。
    </div>
  </div>

  <script src="scripts/site-i18n-core.js"></script>
  <script src="scripts/i18n.js"></script>
  <script>
    const t = (k, vars) => SiteI18n.t(k, vars);
    const ID_WEIGHTS = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];
    const ID_CHECK_MAP = ['1', '0', 'X', '9', '8', '7', '6', '5', '4', '3', '2'];
    const MRZ_WEIGHTS = [7, 3, 1];

    function calcIdCheckDigit(first17) {
      let sum = 0;
      for (let i = 0; i < 17; i++) {
        sum += Number(first17[i]) * ID_WEIGHTS[i];
      }
      return ID_CHECK_MAP[sum % 11];
    }

    function mrzCharValue(ch) {
      if (ch >= '0' && ch <= '9') return ch.charCodeAt(0) - 48;
      if (ch >= 'A' && ch <= 'Z') return ch.charCodeAt(0) - 55;
      if (ch === '<') return 0;
      return NaN;
    }

    function calcMrzCheckDigit(data) {
      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        const val = mrzCharValue(data[i]);
        if (Number.isNaN(val)) return null;
        sum += val * MRZ_WEIGHTS[i % 3];
      }
      return String(sum % 10);
    }

    function normalizeMrz(raw) {
      return raw.toUpperCase().replace(/\s+/g, '');
    }

    function parseMrzLine(raw) {
      if (!raw.trim()) return { error: t('mrz.empty') };

      const lines = raw
        .split(/\r?\n/)
        .map(line => line.trim().toUpperCase().replace(/\s+/g, ''))
        .filter(Boolean);

      let line2;
      if (lines.length >= 2) {
        line2 = lines[lines.length - 1];
      } else {
        const text = normalizeMrz(raw);
        if (text.length === 88) {
          line2 = text.slice(44);
        } else if (text.length === 44) {
          line2 = text;
        } else {
          return { error: t('mrz.lenError', { n: text.length }) };
        }
      }

      if (line2.length !== 44) {
        return { error: t('mrz.lenError', { n: line2.length }) };
      }

      return { line2 };
    }

    function validateMrzChars(str, label) {
      for (const ch of str) {
        if (!/[0-9A-Z<]/.test(ch)) {
          return t('mrz.illegalChar', { label, ch });
        }
      }
      return null;
    }

    function showResult(el, type, title, html) {
      el.className = `result show ${type}`;
      el.innerHTML = `<div class="result-title">${title}</div>${html}`;
    }

    function validateIdCard() {
      const el = document.getElementById('result-idcard');
      const raw = document.getElementById('idcard-input').value.trim().toUpperCase();

      if (!raw) {
        showResult(el, 'warn', t('id.emptyTitle'), t('id.emptyMsg'));
        return;
      }

      if (raw.length !== 18) {
        showResult(el, 'error', t('id.lenTitle'), t('id.lenMsg', { n: raw.length }));
        return;
      }

      const first17 = raw.slice(0, 17);
      const last = raw[17];

      if (!/^\d{17}$/.test(first17)) {
        showResult(el, 'error', t('id.digitsTitle'), t('id.digitsMsg'));
        return;
      }

      if (!/^[0-9X]$/.test(last)) {
        showResult(el, 'error', t('id.lastTitle'), t('id.lastMsg'));
        return;
      }

      const expected = calcIdCheckDigit(first17);
      const valid = last === expected;

      const details = `
        <ul class="detail-list">
          <li>${t('id.first17')}：${first17}</li>
          <li>${t('id.actual')}：${last}</li>
          <li>${t('id.expected')}：${expected}</li>
          <li>${t('id.result')}：<span class="${valid ? 'ok' : 'bad'}">${valid ? t('id.valid') : t('id.invalid')}</span></li>
        </ul>
      `;

      showResult(
        el,
        valid ? 'success' : 'error',
        valid ? t('id.passTitle') : t('id.failTitle'),
        valid
          ? `${t('id.passMsg', { last })}${details}`
          : `${t('id.failMsg', { last, expected })}${details}`
      );
    }

    function validatePassportMrz() {
      const el = document.getElementById('result-passport');
      const parsed = parseMrzLine(document.getElementById('mrz-input').value);

      if (parsed.error) {
        showResult(el, 'warn', t('mrz.formatTitle'), parsed.error);
        return;
      }

      const { line2 } = parsed;
      const charError = validateMrzChars(line2, t('mrz.line2Label'));

      if (charError) {
        showResult(el, 'error', t('mrz.formatErrorTitle'), charError);
        return;
      }

      const docNumber = line2.slice(0, 9);
      const docCheck = line2[9];
      const nationality = line2.slice(10, 13);
      const dob = line2.slice(13, 19);
      const dobCheck = line2[19];
      const sex = line2[20];
      const expiry = line2.slice(21, 27);
      const expiryCheck = line2[27];
      const optional = line2.slice(28, 42);
      const optionalCheck = line2[42];
      const compositeCheck = line2[43];

      const checks = [
        { name: t('mrz.field.passport'), data: docNumber, actual: docCheck, expected: calcMrzCheckDigit(docNumber) },
        { name: t('mrz.field.dob'), data: dob, actual: dobCheck, expected: calcMrzCheckDigit(dob) },
        { name: t('mrz.field.expiry'), data: expiry, actual: expiryCheck, expected: calcMrzCheckDigit(expiry) },
        { name: t('mrz.field.optional'), data: optional, actual: optionalCheck, expected: calcMrzCheckDigit(optional) },
      ];

      const compositeData =
        docNumber + docCheck + dob + dobCheck + expiry + expiryCheck + optional + optionalCheck;

      checks.push({
        name: t('mrz.field.composite'),
        data: compositeData,
        actual: compositeCheck,
        expected: calcMrzCheckDigit(compositeData),
      });

      const failed = checks.filter(item => item.expected === null || item.actual !== item.expected);
      const allValid = failed.length === 0;

      const detailItems = checks.map(item => {
        const ok = item.expected !== null && item.actual === item.expected;
        return `<li>${item.name}（${item.data}）→ ${t('mrz.actual')} <code>${item.actual}</code>，${t('mrz.calc')} <code>${item.expected ?? '?'}</code>：<span class="${ok ? 'ok' : 'bad'}">${ok ? t('mrz.pass') : t('mrz.fail')}</span></li>`;
      }).join('');

      const summary = `
        <ul class="detail-list">
          <li>${t('mrz.line2Label')}：${line2}</li>
          <li>${t('mrz.summary', { doc: docNumber, nat: nationality, dob, sex, exp: expiry })}</li>
        </ul>
        <ul class="detail-list">${detailItems}</ul>
      `;

      showResult(
        el,
        allValid ? 'success' : 'error',
        allValid ? t('mrz.passTitle') : t('mrz.failTitle', { n: failed.length }),
        summary
      );
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
      });
    });

    document.getElementById('btn-idcard').addEventListener('click', validateIdCard);
    document.getElementById('btn-passport').addEventListener('click', validatePassportMrz);

    document.getElementById('btn-idcard-clear').addEventListener('click', () => {
      document.getElementById('idcard-input').value = '';
      document.getElementById('result-idcard').className = 'result';
    });

    document.getElementById('btn-passport-clear').addEventListener('click', () => {
      document.getElementById('mrz-input').value = '';
      document.getElementById('result-passport').className = 'result';
    });

    document.getElementById('idcard-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') validateIdCard();
    });

    document.getElementById('idcard-input').addEventListener('input', e => {
      e.target.value = e.target.value.toUpperCase().replace(/[^\dX]/gi, '');
    });

    document.getElementById('mrz-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') validatePassportMrz();
    });
  </script>
</body>
</html>
